name: Coach analysis

# Pulls the latest Chess.com games, analyzes new ones with Stockfish on
# GitHub's servers, and commits coach-data.json (read by the PWA).
# Runs weekly, or on demand from the Actions tab.

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      user:
        description: 'Chess.com username'
        required: false
        default: 'nimokaji'
      depth:
        description: 'Stockfish search depth per position'
        required: false
        default: '20'
      full:
        description: 'Re-analyze the ENTIRE archive (after a classification change). Slow (~3h).'
        type: boolean
        required: false
        default: false
  push:
    branches: [main]
    # Run when the analyzer changes — NOT when coach-data.json is committed
    # (the results commit only touches that file), so there is no loop.
    paths:
      - 'tools/**'
      - '.github/workflows/analyze.yml'

permissions:
  contents: write

concurrency:
  group: coach-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Stockfish
        run: sudo apt-get update && sudo apt-get install -y stockfish

      - name: Install deps
        working-directory: tools
        run: npm ci

      - name: Analyze games
        working-directory: tools
        env:
          STOCKFISH_PATH: /usr/games/stockfish
          FULL: ${{ github.event.inputs.full == 'true' && '1' || '0' }}
        run: node analyze.mjs --user "${{ github.event.inputs.user || 'nimokaji' }}" --depth "${{ github.event.inputs.depth || '20' }}"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coach-data.json
          if git diff --cached --quiet; then
            echo "No changes to coach-data.json"
          else
            git commit -m "chore: update coach analysis data [skip ci]"
            # A full analysis can run for hours; if another commit lands on
            # main meanwhile, a bare push is non-fast-forward and fails (it
            # silently lost a 3h42m depth-20 run on 2026-06-23). Rebase onto
            # the latest main and retry before giving up.
            for i in 1 2 3; do
              if git pull --rebase --autostash origin main && git push; then
                echo "pushed"; break
              fi
              echo "push attempt $i failed, retrying in 5s…"
              sleep 5
            done
          fi
